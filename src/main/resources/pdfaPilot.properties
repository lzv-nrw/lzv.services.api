# --- General ---
pdfapilot.path=/opt/pdfapilot/pdfaPilot
# time in minutes
pdfapilot.fileDeleteTime=120

# --- Flags Analyzer---
pdfapilot.quickpdfinfo=true

# --- Flags Creator---
pdfapilot.quick=true
pdfapilot.noprogress=true
pdfapilot.substitute=true
pdfapilot.onlypdfa=true
pdfapilot.overwrite=false
pdfapilot.fontfolder=/opt/pdfapilot/fontfolder
pdfapilot.language=de

#--- Flags and Options Report
# report is generated only if pdfapilot.quick is false
pdfapilot.report=false
pdfapilot.report.type=JSON
pdfapilot.report.generate=ALWAYS
pdfapilot.report.path=/var/cache/tomcat/temp/report

# Default PDF/A level (used if no value is provided)
pdfapilot.level=2b
